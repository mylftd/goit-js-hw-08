<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/basiclightbox@5.0.4/dist/basicLightbox.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #1a1a2e;
        --surface: #16213e;
        --accent: #e94560;
        --text: #eaeaea;
        --muted: #8892a4;
        --radius: 12px;
        --gap: 16px;
        --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 48px 24px;
      }

      header {
        text-align: center;
        margin-bottom: 48px;
      }

      header h1 {
        font-size: clamp(1.8rem, 4vw, 3rem);
        font-weight: 700;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      header p {
        color: var(--muted);
        margin-top: 8px;
        font-size: 1rem;
      }

      .gallery {
        list-style: none;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: var(--gap);
        max-width: 1200px;
        margin: 0 auto;
      }

      .gallery-item {
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        transition:
          transform var(--transition),
          box-shadow var(--transition);
      }

      .gallery-item:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 12px 40px rgba(233, 69, 96, 0.25);
      }

      .gallery-link {
        display: block;
        position: relative;
        overflow: hidden;
        cursor: zoom-in;
      }

      .gallery-link::after {
        content: '🔍';
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        background: rgba(233, 69, 96, 0.5);
        opacity: 0;
        transition: opacity var(--transition);
        backdrop-filter: blur(2px);
      }

      .gallery-item:hover .gallery-link::after {
        opacity: 1;
      }

      .gallery-image {
        display: block;
        width: 100%;
        height: 220px;
        object-fit: cover;
        transition: transform var(--transition);
      }

      .gallery-item:hover .gallery-image {
        transform: scale(1.08);
      }

      .basicLightbox {
        background: rgba(10, 10, 20, 0.92);
        backdrop-filter: blur(8px);
      }

      .basicLightbox__placeholder img {
        max-width: 90vw;
        max-height: 85vh;
        border-radius: var(--radius);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8);
        display: block;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .gallery-item {
        animation: fadeUp 0.5s ease both;
      }

      .gallery-item:nth-child(1) {
        animation-delay: 0.05s;
      }
      .gallery-item:nth-child(2) {
        animation-delay: 0.1s;
      }
      .gallery-item:nth-child(3) {
        animation-delay: 0.15s;
      }
      .gallery-item:nth-child(4) {
        animation-delay: 0.2s;
      }
      .gallery-item:nth-child(5) {
        animation-delay: 0.25s;
      }
      .gallery-item:nth-child(6) {
        animation-delay: 0.3s;
      }
      .gallery-item:nth-child(7) {
        animation-delay: 0.35s;
      }
      .gallery-item:nth-child(8) {
        animation-delay: 0.4s;
      }
      .gallery-item:nth-child(9) {
        animation-delay: 0.45s;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Image Gallery</h1>
      <p>Click any image to view full size</p>
    </header>

    <ul class="gallery"></ul>

    <script src="https://cdn.jsdelivr.net/npm/basiclightbox@5.0.4/dist/basicLightbox.min.js"></script>
    <script src="gallery.js"></script>
  </body>
</html>
